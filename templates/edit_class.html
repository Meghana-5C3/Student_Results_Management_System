{% extends 'admin_base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h2 class="mb-4">
        <i class="fas fa-edit"></i> Edit Student Class
    </h2>

    {% if messages %}
        {% for m in messages %}  
        <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show" role="alert">
                {{m}}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <!-- Class Name / Title -->
        <div class="mb-3">
            <label for="class_name" class="form-label">Class Name / Title</label>
            <input type="text" class="form-control" id="class_name" name="class_name" 
                   required placeholder="e.g., CSE 2nd Year B" value="{{class_obj.class_name}}">
            <small class="text-muted">Enter full class title (e.g., CSE 2nd Year Section B)</small>
        </div>

        <!-- Class Code -->
       

<!-- Department -->
<div class="mb-3">
    <label for="department" class="form-label">Department</label>
    <select class="form-select" id="department" name="department" required>
        <option value="">-- Select Department --</option>
        <option value="CSE" {% if class_obj.department == "CSE" %}selected{% endif %}>CSE</option>
        <option value="ECE" {% if class_obj.department == "ECE" %}selected{% endif %}>ECE</option>
        <option value="EEE" {% if class_obj.department == "EEE" %}selected{% endif %}>EEE</option>
        <option value="MECH" {% if class_obj.department == "MECH" %}selected{% endif %}>Mechanical</option>
        <option value="CIVIL" {% if class_obj.department == "CIVIL" %}selected{% endif %}>Civil</option>
        <option value="CSE CS" {% if class_obj.department == "CSE CS" %}selected{% endif %}>Cyber Security</option>
    </select>
</div>

<!-- Year -->
<div class="mb-3">
    <label for="year" class="form-label">Year</label>
    <select class="form-select" id="year" name="year" required>
        <option value="">-- Select Year --</option>
        <option value="1" {% if class_obj.year == 1 %}selected{% endif %}>I Year</option>
        <option value="2" {% if class_obj.year == 2 %}selected{% endif %}>II Year</option>
        <option value="3" {% if class_obj.year == 3 %}selected{% endif %}>III Year</option>
        <option value="4" {% if class_obj.year == 4 %}selected{% endif %}>IV Year</option>
    </select>
</div>

<!-- Semester -->
<div class="mb-3">
    <label for="semester" class="form-label">Semester</label>
    <select class="form-select" id="semester" name="semester" required>
        <option value="">-- Select Semester --</option>
        <option value="1" {% if class_obj.semester == 1 %}selected{% endif %}>I Semester</option>
        <option value="2" {% if class_obj.semester == 2 %}selected{% endif %}>II Semester</option>
    </select>
</div>

<!-- Section -->
<div class="mb-3">
    <label for="section" class="form-label">Section</label>
    <input type="text" class="form-control" id="section" name="section" 
           required placeholder="e.g., A, B, C" value="{{class_obj.section}}">
    <small class="text-muted">Enter section letter (e.g., A, B)</small>
</div>

<!-- Academic Session -->
<div class="mb-3">
    <label for="academic_session" class="form-label">Academic Session</label>
    <select class="form-select" id="academic_session" name="academic_session" required>
        <option value="">-- Select Academic Year --</option>
        <option value="2024-2025" {% if class_obj.academic_session == "2024-2025" %}selected{% endif %}>2024 - 2025</option>
        <option value="2025-2026" {% if class_obj.academic_session == "2025-2026" %}selected{% endif %}>2025 - 2026</option>
        <option value="2026-2027" {% if class_obj.academic_session == "2026-2027" %}selected{% endif %}>2026 - 2027</option>
    </select>
</div>

<!-- Remarks / Description -->
<div class="mb-3">
    <label for="remarks" class="form-label">Remarks / Description</label>
    <textarea class="form-control" id="remarks" name="remarks" rows="3"
              placeholder="Enter any extra details about this class (optional)">{{ class_obj.remarks }}</textarea>
</div>

            

        <!-- Submit Button -->
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i> Submit
        </button>
    </form>
</div>

{% endblock %}
