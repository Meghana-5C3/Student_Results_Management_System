{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-warning text-dark">
      Notice Detail
    </div>
    <div class="card-body">
      <h4>{{ notice.title }}</h4>
      <p class="text-muted">Published on {{ notice.publish_date|date:"M d, Y" }}</p>
      <hr>
      <p>{{ notice.content|linebreaks }}</p>  <!-- Updated here -->
      <a href="{% url 'index' %}" class="btn btn-secondary mt-3">Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
