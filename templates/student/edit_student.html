{% extends 'admin_base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h2 class="mb-4">
        <i class="fas fa-user-edit"></i> Edit Student
    </h2>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show" role="alert">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="roll_number" class="form-label">Roll Number</label>
                <input type="text" class="form-control" id="roll_number" name="roll_number" value="{{ student.roll_number }}" required>
            </div>
            <div class="col-md-6">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="full_name" value="{{ student.full_name }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-select" id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if student.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="date_of_birth" class="form-label">Date of Birth</label>
                <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ student.date_of_birth|date:'Y-m-d' }}" required>
            </div>
            <div class="col-md-4">
                <label for="admission_year" class="form-label">Admission Year</label>
                <input type="text" class="form-control" id="admission_year" name="admission_year" value="{{ student.admission_year }}">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ student.email }}" required>
            </div>
            <div class="col-md-6">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ student.phone }}">
            </div>
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" name="address" rows="2">{{ student.address }}</textarea>
        </div>

        <div class="mb-3">
            <label for="student_class" class="form-label">Class</label>
            <select class="form-select" id="student_class" name="student_class" required>
                <option value="">Select Class</option>
                {% for cls in classes %}
                    <option value="{{ cls.id }}" {% if student.student_class.id == cls.id %}selected{% endif %}>{{ cls.department }} {{ cls.section }} ({{ cls.year }} Year)</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="profile_picture" class="form-label">Profile Picture</label>
            <input type="file" class="form-control" id="profile_picture" name="profile_picture">
            {% if student.profile_picture %}
                <img src="{{ student.profile_picture.url }}" class="img-thumbnail mt-2" width="100" height="100">
            {% endif %}
        </div>

        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Student</button>
        <a href="{% url 'manage_students' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
