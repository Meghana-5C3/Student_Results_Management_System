{% extends 'admin_base.html' %}
{% load static %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="fas fa-plus"></i> Add Subject Combination</h4>
        </div>
        <div class="card-body">
            {% if messages %}
                {% for m in messages %}
                    <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                        {{ m }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <!-- Department Dropdown -->
                    <div class="col-md-6">
                        <label class="form-label">Select Department</label>
                        <select class="form-select" id="department_filter">
                            <option value="all">All Departments</option>
                            {% for dept in departments %}
                                <option value="{{ dept }}">{{ dept }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Class Dropdown (auto filtered by department) -->
                    <div class="col-md-6">
                        <label class="form-label">Select Class <span class="text-danger">*</span></label>
                        <select class="form-select" name="student_class" id="class_filter" required>
                            <option value="">-- Select Class --</option>
                            {% for c in classes %}
                                <option data-dept="{{ c.department }}" value="{{ c.id }}">
                                    {{ c.class_name }} ({{ c.department }} - Year {{ c.year }} Sec {{ c.section }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Subjects (multi-select) -->
                    <div class="col-12">
                        <label class="form-label">Select Subjects <span class="text-danger">*</span></label>
                        <select class="form-select" name="subjects" multiple size="10" id="subjects" required>
                            {% for s in subjects %}
                                <option class="dept-{{ s.assigned_class.department }}" data-class="{{ s.assigned_class.id }}" value="{{ s.id }}">
                                    {{ s.subject_code }} - {{ s.subject_name }} ({{ s.assigned_class.class_name }})
                                </option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Ctrl/Cmd to select multiple. Filter above.</small>
                    </div>

                    <div class="col-12 text-end mt-3">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check-circle me-1"></i> Add Combination
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
const deptFilter = document.getElementById('department_filter');
const classFilter = document.getElementById('class_filter');
const classOptions = classFilter.querySelectorAll('option');
const subjectOptions = document.querySelectorAll('#subjects option');

deptFilter.addEventListener('change', () => {
    const selectedDept = deptFilter.value;

    // Filter Classes
    classOptions.forEach(opt => {
        if (!opt.value) return; // skip placeholder
        if (selectedDept === 'all' || opt.dataset.dept === selectedDept) {
            opt.style.display = '';
        } else {
            opt.style.display = 'none';
            if (classFilter.value === opt.value) {
                classFilter.value = ""; // reset class if hidden
            }
        }
    });

    // Filter Subjects (department level filter)
    subjectOptions.forEach(opt => {
        if (selectedDept === 'all' || opt.classList.contains('dept-' + selectedDept)) {
            opt.style.display = '';
        } else {
            opt.style.display = 'none';
        }
    });
});

// Filter subjects again when class changes
classFilter.addEventListener('change', () => {
    const selectedClass = classFilter.value;
    subjectOptions.forEach(opt => {
        if (!selectedClass || opt.dataset.class === selectedClass) {
            opt.style.display = '';
        } else {
            opt.style.display = 'none';
        }
    });
});
</script>

{% endblock %}
