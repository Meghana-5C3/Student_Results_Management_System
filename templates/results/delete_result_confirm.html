{% extends 'admin_base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-danger">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h4>
        </div>
        <div class="card-body text-center">
            <p class="lead">
                Are you sure you want to delete the result for 
                <strong>{{ result.student.full_name }}</strong> 
                (Roll No: {{ result.student.roll_number }})?
            </p>

            <div class="d-flex justify-content-center gap-3">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash-alt me-1"></i> Yes, Delete
                    </button>
                </form>
                <a href="{% url 'manage_results' %}" class="btn btn-secondary">
                    <i class="fas fa-times me-1"></i> Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
